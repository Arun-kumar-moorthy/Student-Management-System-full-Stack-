<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Management System</title>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-color: #4f46e5;
            --primary-hover: #4338ca;
            --bg-color: #f8fafc;
            --card-bg: #ffffff;
            --text-main: #1e293b;
            --text-muted: #64748b;
            --border-color: #e2e8f0;
            --success: #10b981;
            --danger: #ef4444;
            --warning: #f59e0b;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Outfit', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            line-height: 1.6;
            padding: 2rem 1rem;
        }

        .container {
            max-width: 1000px;
            margin: 0 auto;
        }

        header {
            text-align: center;
            margin-bottom: 3rem;
        }

        header h1 {
            font-size: 2.5rem;
            font-weight: 600;
            color: var(--primary-color);
            margin-bottom: 0.5rem;
        }

        header p {
            color: var(--text-muted);
        }

        /* Form Styling */
        .card {
            background: var(--card-bg);
            padding: 2rem;
            border-radius: 1rem;
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.05), 0 8px 10px -6px rgba(0, 0, 0, 0.05);
            margin-bottom: 2rem;
            transition: transform 0.3s ease;
        }

        .form-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 1.5rem;
            margin-bottom: 1.5rem;
        }

        .form-group {
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
        }

        .form-group label {
            font-weight: 600;
            font-size: 0.9rem;
            color: var(--text-muted);
        }

        .form-group input {
            padding: 0.75rem 1rem;
            border: 1px solid var(--border-color);
            border-radius: 0.5rem;
            font-size: 1rem;
            outline: none;
            transition: border-color 0.2s, box-shadow 0.2s;
        }

        .form-group input:focus {
            border-color: var(--primary-color);
            box-shadow: 0 0 0 3px rgba(79, 70, 229, 0.1);
        }

        .btn-group {
            display: flex;
            gap: 1rem;
            justify-content: flex-end;
        }

        .btn {
            padding: 0.75rem 1.5rem;
            border: none;
            border-radius: 0.5rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
        }

        .btn-primary {
            background-color: var(--primary-color);
            color: white;
        }

        .btn-primary:hover {
            background-color: var(--primary-hover);
            transform: translateY(-1px);
        }

        .btn-outline {
            background-color: transparent;
            border: 1px solid var(--border-color);
            color: var(--text-muted);
        }

        .btn-outline:hover {
            background-color: #f1f5f9;
            color: var(--text-main);
        }

        /* Search Bar */
        .search-area {
            margin-bottom: 2rem;
            display: flex;
            gap: 1rem;
            align-items: center;
        }

        .search-input-wrapper {
            position: relative;
            flex-grow: 1;
        }

        .search-input-wrapper input {
            width: 100%;
            padding: 0.75rem 1rem 0.75rem 2.5rem;
            border: 1px solid var(--border-color);
            border-radius: 0.5rem;
            background: var(--card-bg);
        }

        .search-icon {
            position: absolute;
            left: 0.75rem;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-muted);
        }

        /* Table Styling */
        .table-container {
            overflow-x: auto;
            background: var(--card-bg);
            border-radius: 1rem;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
        }

        table {
            width: 100%;
            border-collapse: collapse;
            text-align: left;
        }

        thead {
            background-color: #f1f5f9;
        }

        th {
            padding: 1rem 1.5rem;
            font-weight: 600;
            color: var(--text-muted);
            text-transform: uppercase;
            font-size: 0.75rem;
            letter-spacing: 0.05em;
        }

        td {
            padding: 1rem 1.5rem;
            border-bottom: 1px solid var(--border-color);
            vertical-align: middle;
        }

        tr:last-child td {
            border-bottom: none;
        }

        tr:hover {
            background-color: #f8fafc;
        }

        .actions {
            display: flex;
            gap: 0.5rem;
        }

        .btn-icon {
            padding: 0.5rem;
            border-radius: 0.375rem;
            border: none;
            cursor: pointer;
            transition: background 0.2s;
        }

        .btn-edit {
            background-color: rgba(245, 158, 11, 0.1);
            color: var(--warning);
        }

        .btn-edit:hover {
            background-color: var(--warning);
            color: white;
        }

        .btn-delete {
            background-color: rgba(239, 68, 68, 0.1);
            color: var(--danger);
        }

        .btn-delete:hover {
            background-color: var(--danger);
            color: white;
        }

        /* Alerts */
        .toast {
            position: fixed;
            bottom: 2rem;
            right: 2rem;
            padding: 1rem 1.5rem;
            border-radius: 0.5rem;
            color: white;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
            transform: translateY(100px);
            opacity: 0;
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            z-index: 1000;
        }

        .toast.show {
            transform: translateY(0);
            opacity: 1;
        }

        .toast-success { background-color: var(--success); }
        .toast-error { background-color: var(--danger); }

        /* Responsive */
        @media (max-width: 640px) {
            .form-grid {
                grid-template-columns: 1fr;
            }
            .header h1 {
                font-size: 2rem;
            }
        }

        /* Loading Spinner */
        .loader {
            width: 20px;
            height: 20px;
            border: 2px solid #FFF;
            border-bottom-color: transparent;
            border-radius: 50%;
            display: none;
            animation: rotation 1s linear infinite;
        }

        @keyframes rotation {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>

    <div class="container">
        <header>
            <h1>Student Registry</h1>
            <p>Manage your students with precision and ease</p>
        </header>

        <!-- Student Form -->
        <div class="card">
            <h2 style="margin-bottom: 1.5rem; font-size: 1.25rem;">Student Details</h2>
            <form id="studentForm">
                <input type="hidden" id="editTaskId" value="">
                <div class="form-grid">
                    <div class="form-group">
                        <label for="studentId">Student ID</label>
                        <input type="text" id="studentId" placeholder="e.g. S101" required>
                    </div>
                    <div class="form-group">
                        <label for="name">Full Name</label>
                        <input type="text" id="name" placeholder="John Doe" required>
                    </div>
                    <div class="form-group">
                        <label for="age">Age</label>
                        <input type="number" id="age" placeholder="20" required min="1" max="120">
                    </div>
                    <div class="form-group">
                        <label for="marks">Marks (%)</label>
                        <input type="number" id="marks" placeholder="85" required min="0" max="100">
                    </div>
                </div>
                <div class="btn-group">
                    <button type="button" class="btn btn-outline" id="clearBtn">Clear</button>
                    <button type="submit" class="btn btn-primary" id="submitBtn">
                        <span id="btnText">Add Student</span>
                        <div class="loader" id="submitLoader"></div>
                    </button>
                </div>
            </form>
        </div>

        <!-- Search Area -->
        <div class="search-area">
            <div class="search-input-wrapper">
                <span class="search-icon">🔍</span>
                <input type="text" id="searchId" placeholder="Search by student ID...">
            </div>
            <button class="btn btn-primary" id="searchBtn">Search</button>
            <button class="btn btn-outline" id="resetTableBtn">Refresh All</button>
        </div>

        <!-- Students Table -->
        <div class="table-container">
            <table>
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>Name</th>
                        <th>Age</th>
                        <th>Marks</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody id="studentTableBody">
                    <!-- Rows will be injected here -->
                </tbody>
            </table>
        </div>
    </div>

    <!-- Toast Notification -->
    <div id="toast" class="toast"></div>

    <script>
        const API_URL = 'http://localhost:7090/students';
        
        const studentForm = document.getElementById('studentForm');
        const studentTableBody = document.getElementById('studentTableBody');
        const submitBtn = document.getElementById('submitBtn');
        const btnText = document.getElementById('btnText');
        const submitLoader = document.getElementById('submitLoader');
        const clearBtn = document.getElementById('clearBtn');
        const searchBtn = document.getElementById('searchBtn');
        const searchInput = document.getElementById('searchId');
        const resetTableBtn = document.getElementById('resetTableBtn');

        let isEditing = false;
        let currentEditingId = null;

        // --- API Functions ---

        async function fetchStudents() {
            try {
                const response = await fetch(API_URL);
                if (!response.ok) throw new Error('Failed to fetch students');
                const students = await response.json();
                renderTable(students);
            } catch (error) {
                showToast(error.message, 'error');
            }
        }

        async function saveStudent(studentData) {
            setLoading(true);
            try {
                const url = isEditing ? `${API_URL}/${currentEditingId}` : API_URL;
                const method = isEditing ? 'PUT' : 'POST';
                
                const response = await fetch(url, {
                    method: method,
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(studentData)
                });

                if (!response.ok) {
                    const errorMsg = await response.text();
                    throw new Error(errorMsg || 'Failed to save student');
                }

                showToast(`Student ${isEditing ? 'updated' : 'added'} successfully!`, 'success');
                resetForm();
                fetchStudents();
            } catch (error) {
                showToast(error.message, 'error');
            } finally {
                setLoading(false);
            }
        }

        async function deleteStudent(id) {
            if (!confirm('Are you sure you want to delete this student?')) return;

            try {
                const response = await fetch(`${API_URL}/${id}`, { method: 'DELETE' });
                if (!response.ok) throw new Error('Failed to delete student');
                
                showToast('Student deleted successfully', 'success');
                fetchStudents();
            } catch (error) {
                showToast(error.message, 'error');
            }
        }

        async function searchStudent() {
            const id = searchInput.value.trim();
            if (!id) {
                fetchStudents();
                return;
            }

            try {
                const response = await fetch(`${API_URL}/${id}`);
                if (!response.ok) {
                    if (response.status === 404) throw new Error('Student not found');
                    throw new Error('Search failed');
                }
                const student = await response.json();
                renderTable([student]);
            } catch (error) {
                showToast(error.message, 'error');
            }
        }

        // --- Helper Functions ---

        function renderTable(students) {
            studentTableBody.innerHTML = '';
            
            if (students.length === 0) {
                studentTableBody.innerHTML = '<tr><td colspan="5" style="text-align: center; color: var(--text-muted);">No students found</td></tr>';
                return;
            }

            students.forEach(std => {
                const row = document.createElement('tr');
                row.innerHTML = `
                    <td><strong>${std.id}</strong></td>
                    <td>${std.name}</td>
                    <td>${std.age}</td>
                    <td><span style="font-weight: 600;">${std.marks}%</span></td>
                    <td class="actions">
                        <button class="btn-icon btn-edit" title="Edit" onclick="prepareEdit('${std.id}', '${std.name}', ${std.age}, ${std.marks})">
                            Edit
                        </button>
                        <button class="btn-icon btn-delete" title="Delete" onclick="deleteStudent('${std.id}')">
                            Delete
                        </button>
                    </td>
                `;
                studentTableBody.appendChild(row);
            });
        }

        function prepareEdit(id, name, age, marks) {
            isEditing = true;
            currentEditingId = id;
            document.getElementById('studentId').value = id;
            document.getElementById('studentId').disabled = true; // Typically IDs aren't editable
            document.getElementById('name').value = name;
            document.getElementById('age').value = age;
            document.getElementById('marks').value = marks;
            
            btnText.textContent = 'Update Student';
            submitBtn.classList.add('btn-warning');
            
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        function resetForm() {
            isEditing = false;
            currentEditingId = null;
            studentForm.reset();
            document.getElementById('studentId').disabled = false;
            btnText.textContent = 'Add Student';
            submitBtn.classList.remove('btn-warning');
        }

        function setLoading(loading) {
            if (loading) {
                btnText.style.display = 'none';
                submitLoader.style.display = 'block';
                submitBtn.disabled = true;
            } else {
                btnText.style.display = 'block';
                submitLoader.style.display = 'none';
                submitBtn.disabled = false;
            }
        }

        function showToast(message, type = 'success') {
            const toast = document.getElementById('toast');
            toast.textContent = message;
            toast.className = `toast toast-${type} show`;
            
            setTimeout(() => {
                toast.classList.remove('show');
            }, 3000);
        }

        // --- Event Listeners ---

        studentForm.addEventListener('submit', (e) => {
            e.preventDefault();
            const studentData = {
                id: document.getElementById('studentId').value,
                name: document.getElementById('name').value,
                age: parseInt(document.getElementById('age').value),
                marks: parseFloat(document.getElementById('marks').value)
            };
            saveStudent(studentData);
        });

        clearBtn.addEventListener('click', resetForm);
        searchBtn.addEventListener('click', searchStudent);
        resetTableBtn.addEventListener('click', () => {
            searchInput.value = '';
            fetchStudents();
        });

        // Initialize
        fetchStudents();
    </script>
</body>
</html>
